<!DOCTYPE html>
<html lang="en" data-theme="dark" data-team="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1Stats — Standings 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="api-loading-overlay" class="api-loading-overlay">
    <div class="api-spinner"></div>
    <div class="api-loading-text">Loading <span>Live Data</span></div>
  </div>


  <header class="nav-header">
    <div class="nav-inner">
      <a href="index.html" class="logo"><span class="logo-f1">F1</span><span class="logo-stats">STATS</span></a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="drivers.html" class="nav-link">Drivers</a>
        <a href="teams.html" class="nav-link">Teams</a>
        <a href="standings.html" class="nav-link active">Standings</a>
        <a href="calendar.html" class="nav-link">Calendar</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon">☀</span></button>
        <button class="hamburger" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
      </div>
    </div>
    <nav class="mobile-nav" id="mobile-nav">
      <a href="index.html" class="mobile-nav-link">Home</a>
      <a href="drivers.html" class="mobile-nav-link">Drivers</a>
      <a href="teams.html" class="mobile-nav-link">Teams</a>
      <a href="standings.html" class="mobile-nav-link active">Standings</a>
      <a href="calendar.html" class="mobile-nav-link">Calendar</a>
    </nav>
    <div class="team-bar"></div>
  </header>

  <main>
    <section class="page-hero">
      <h1 class="page-title">Standings</h1>
      <p class="page-sub" id="standings-page-sub">Loading...</p>
    </section>
    <div class="standings-tabs">
      <button class="tab-btn active" onclick="switchTab('drivers-tab',this)">Drivers</button>
      <button class="tab-btn" onclick="switchTab('constructors-tab',this)">Constructors</button>
    </div>

    <div id="drivers-tab" class="tab-panel active">
      <table class="full-standings-table">
        <thead>
          <tr><th>Pos</th><th>Driver</th><th>Team</th><th class="pts-col">PTS</th></tr>
        </thead>
        <tbody id="standings-drivers-body">
          <!-- Populated dynamically via OpenF1 API -->
        </tbody>
      </table>
    </div>

    <div id="constructors-tab" class="tab-panel">
      <table class="full-standings-table">
        <thead>
          <tr><th>Pos</th><th>Constructor</th><th>Drivers</th><th class="pts-col">PTS</th></tr>
        </thead>
        <tbody id="standings-constructors-body">
          <!-- Populated dynamically via OpenF1 API -->
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">F1<span>STATS</span></div>
      <p class="footer-copy">2026 season standings after Round 2 — Chinese GP. Not affiliated with Formula 1®.</p>
      <div class="footer-links">
        <a href="https://openf1.org/" target="_blank">OpenF1</a>
        <a href="https://flagcdn.com" target="_blank">FlagCDN</a>
        <a href="https://www.formula1.com" target="_blank">Formula1.com</a>
      </div>
    </div>
  </footer>
  <script src="app.js"></script>
  <script src="api.js"></script>
</body>
</html>
